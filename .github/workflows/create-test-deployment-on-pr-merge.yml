name: Create Test Deployment on PR Merge

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: read
  pull-requests: read
  deployments: write

jobs:
  create-deployment:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'deployment-test')
    runs-on: ubuntu-latest
    outputs:
      deployment_id: ${{ steps.create.outputs.result }}
      deployment_state: ${{ steps.state.outputs.deployment_state }}
    steps:
      - name: Decide deployment result (success/failure) from labels
        id: state
        run: |
          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'deployment-fail'; then
            echo "deployment_state=failure" >> "$GITHUB_OUTPUT"
          else
            echo "deployment_state=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Create test deployment
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const ref = context.payload.pull_request.merge_commit_sha || context.payload.pull_request.head.sha;
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
              environment: "test-deployment",
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
              description: `Test deployment for merged PR #${context.payload.pull_request.number}`
            });
            core.info(`Created deployment ${deployment.data.id} for ref ${ref}`);
            return String(deployment.data.id);

  set-deployment-status:
    needs: create-deployment
    runs-on: ubuntu-latest
    steps:
      - name: Set deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = Number("${{ needs.create-deployment.outputs.deployment_id }}");
            const state = "${{ needs.create-deployment.outputs.deployment_state }}";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state,
              log_url: runUrl,
              environment_url: `https://example.com/test-deployment/${deploymentId}`,
              description: `Test ${state} deployment status for testing`
            });
            core.notice(`Deployment ${deploymentId} marked as ${state}`);
