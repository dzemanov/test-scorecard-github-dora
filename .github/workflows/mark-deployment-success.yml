name: Mark Deployment Success

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: "Deployment ID to mark as success"
        required: true
        type: number

permissions:
  contents: read
  deployments: write

jobs:
  mark-success:
    runs-on: ubuntu-latest
    steps:
      - name: Mark deployment as success
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = Number("${{ inputs.deployment_id }}");
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: "success",
              log_url: runUrl,
              environment_url: `https://example.com/test-deployment/${deploymentId}`,
              description: "Manually marked success for deployment testing"
            });
            core.notice(`Deployment ${deploymentId} marked as success`);
