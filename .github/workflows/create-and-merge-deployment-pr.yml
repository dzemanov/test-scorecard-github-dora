name: Create and Merge Deployment PR

on:
  workflow_dispatch:
    inputs:
      auto_merge:
        description: "Automatically merge the created PR"
        required: true
        default: true
        type: boolean
      deployment_status:
        description: "Expected deployment status after PR merge"
        required: true
        default: success
        type: choice
        options:
          - error
          - success
          - failure
          - inactive
          - in_progress
          - queued
          - pending
      merge_delay_minutes:
        description: "How many minutes to wait before auto-merge"
        required: true
        default: 5
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-test-pr:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      BRANCH_NAME: test-deployment/${{ github.run_id }}-${{ github.run_attempt }}
      FILE_NAME: deployment-simulations/latest.md
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create branch and commit test marker update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"

          {
            echo "# Test PR for deployment testing"
            echo
            echo "- run_id: ${{ github.run_id }}"
            echo "- run_attempt: ${{ github.run_attempt }}"
            echo "- created_at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          } > "$FILE_NAME"

          git add "$FILE_NAME"
          git commit -m "chore: update test deployment marker"
          git push origin "$BRANCH_NAME"

      - name: Require merge token
        if: ${{ inputs.auto_merge }}
        env:
          GH_MERGE_TOKEN: ${{ secrets.GH_MERGE_TOKEN }}
        run: |
          if [ -z "$GH_MERGE_TOKEN" ]; then
            echo "Missing required secret GH_MERGE_TOKEN."
            exit 1
          fi

      - name: Create pull request
        id: pr
        run: |
          pr_url="$(gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "chore: test deployment PR (${GITHUB_RUN_ID})" \
            --body "Automatically created to test PR-triggered deployment events. Expected status: ${{ inputs.deployment_status }}.")"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          echo "Created PR: $pr_url"

      - name: Ensure labels exist and assign deployment status labels
        run: |
          gh label create deployment-test --color 1d76db --description "PR is eligible for test deployment event" 2>/dev/null || true
          for state in error failure inactive in_progress queued pending success; do
            gh label create "deployment-status-$state" --color 6f42c1 --description "Merged PR should create test deployment status: $state" 2>/dev/null || true
          done

          gh pr edit "${{ steps.pr.outputs.pr_url }}" --add-label deployment-test
          gh pr edit "${{ steps.pr.outputs.pr_url }}" --add-label "deployment-status-${{ inputs.deployment_status }}"
          echo "Added labels deployment-test,deployment-status-${{ inputs.deployment_status }} to: ${{ steps.pr.outputs.pr_url }}"

      - name: Wait until labels are visible on PR
        if: ${{ inputs.auto_merge }}
        run: |
          pr_url="${{ steps.pr.outputs.pr_url }}"
          required_labels="deployment-test deployment-status-${{ inputs.deployment_status }}"

          for attempt in 1 2 3 4 5; do
            labels="$(gh pr view "$pr_url" --json labels --jq '.labels[].name' | tr '\n' ' ')"
            echo "Attempt $attempt labels: $labels"

            missing=0
            for required in $required_labels; do
              if ! echo " $labels " | grep -q " $required "; then
                missing=1
              fi
            done

            if [ "$missing" -eq 0 ]; then
              echo "All required labels are visible on PR."
              exit 0
            fi

            sleep 2
          done

          echo "Required labels were not visible before merge. Deployment workflow will be skipped."
          exit 1

      - name: Wait before auto-merge
        if: ${{ inputs.auto_merge }}
        run: |
          delay_minutes="${{ inputs.merge_delay_minutes }}"
          if ! [[ "$delay_minutes" =~ ^[0-9]+$ ]]; then
            echo "merge_delay_minutes must be a non-negative integer. Got: $delay_minutes"
            exit 1
          fi
          delay_seconds=$((delay_minutes * 60))
          echo "Waiting $delay_minutes minute(s) before auto-merge..."
          sleep "$delay_seconds"

      - name: Auto-merge pull request
        if: ${{ inputs.auto_merge }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_MERGE_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.pr_url }}" --merge --delete-branch
          echo "Requested merge for: ${{ steps.pr.outputs.pr_url }}"
